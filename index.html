<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOLLAR CANS</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f5e6c8;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 20px;
  color: #2c1810;
}
#app {
  width: 100%;
  max-width: 800px;
  background: #fdf6e3;
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  padding: 30px;
  min-height: 80vh;
  position: relative;
}
.header {
  text-align: center;
  margin-bottom: 30px;
}
.logo {
  width: 100px;
  height: 120px;
  margin: 0 auto 10px;
}
.logo svg { width: 100%; height: 100%; }
h1 {
  font-size: 3em;
  color: #c0392b;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
  letter-spacing: 6px;
  font-weight: 900;
}
h2 { font-size: 1.5em; color: #c0392b; margin-bottom: 10px; }
.postal-section {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 25px 0;
  font-size: 1.4em;
}
.postal-section label { font-weight: 700; color: #2c1810; }
.postal-section input {
  width: 100px;
  padding: 10px 14px;
  font-size: 1.2em;
  border: 3px solid #c0392b;
  border-radius: 8px;
  text-transform: uppercase;
  text-align: center;
  font-weight: 700;
  letter-spacing: 4px;
  outline: none;
  background: #fff;
}
.postal-section input:focus { border-color: #e67e22; box-shadow: 0 0 0 3px rgba(230,126,34,0.3); }
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.modal-overlay.active { display: flex; }
.modal-content {
  background: #fdf6e3;
  border-radius: 16px;
  padding: 30px;
  max-width: 600px;
  width: 90%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  position: relative;
}
.modal-content h2 { text-align: center; }
.btn {
  display: inline-block;
  padding: 12px 28px;
  border: none;
  border-radius: 8px;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.btn-primary { background: #c0392b; color: #fff; }
.btn-primary:hover { background: #e74c3c; transform: translateY(-1px); }
.btn-secondary { background: #7f8c8d; color: #fff; }
.btn-secondary:hover { background: #95a5a6; }
.btn-success { background: #27ae60; color: #fff; }
.btn-success:hover { background: #2ecc71; }
.btn-danger { background: #e74c3c; color: #fff; }
.btn-danger:hover { background: #c0392b; }
.btn-warning { background: #e67e22; color: #fff; }
.btn-warning:hover { background: #f39c12; }
.popup-msg {
  font-size: 1.6em;
  text-align: center;
  margin: 20px 0;
  color: #2c1810;
  font-weight: 700;
}
.go-cards-wrap { text-align: center; margin-top: 20px; }
#directoryPage { display: none; }
.page-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  flex-wrap: wrap;
  gap: 10px;
}
.page-header h2 { margin: 0; }
.card-count {
  font-size: 1em;
  color: #7f8c8d;
  background: #ecf0f1;
  padding: 4px 12px;
  border-radius: 20px;
}
.cards-container {
  max-height: 60vh;
  overflow-y: auto;
  border: 2px solid #d5c4a1;
  border-radius: 12px;
  padding: 15px;
  background: #fff;
  margin: 15px 0;
}
.cards-container::-webkit-scrollbar { width: 8px; }
.cards-container::-webkit-scrollbar-track { background: #f0e6d2; border-radius: 4px; }
.cards-container::-webkit-scrollbar-thumb { background: #c0392b; border-radius: 4px; }
.card-item {
  background: #fdf6e3;
  border: 2px solid #d5c4a1;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 12px;
}
.card-item:last-child { margin-bottom: 0; }
.card-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.card-item-type {
  font-weight: 700;
  color: #c0392b;
}
.card-item-number {
  font-family: monospace;
  font-size: 1.1em;
  font-weight: 700;
  color: #2c1810;
}
.card-item-field { margin: 4px 0; font-size: 0.9em; color: #555; }
.card-item-field strong { color: #2c1810; }
.page-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
.type-select { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
.type-select label {
  display: flex; align-items: center; gap: 8px;
  font-size: 1.1em; font-weight: 700;
  cursor: pointer;
  padding: 12px 20px;
  border: 3px solid #d5c4a1;
  border-radius: 10px;
  transition: all 0.2s;
}
.type-select label:hover { border-color: #c0392b; }
.type-select input[type="radio"] { width: 20px; height: 20px; accent-color: #c0392b; }
.type-select input[type="radio"]:checked + span { color: #c0392b; }
.next-wrap { text-align: center; margin-top: 15px; }
.form-section { display: none; }
.form-section.active { display: block; }
.form-group { margin: 12px 0; }
.form-group label { display: block; font-weight: 700; margin-bottom: 4px; color: #2c1810; }
.form-group input, .form-group textarea {
  width: 100%;
  padding: 8px 12px;
  border: 2px solid #d5c4a1;
  border-radius: 6px;
  font-size: 1em;
  outline: none;
}
.form-group input:focus, .form-group textarea:focus { border-color: #c0392b; }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-group-inline { display: flex; gap: 15px; flex-wrap: wrap; }
.form-group-inline label { display: flex; align-items: center; gap: 4px; font-weight: 400; cursor: pointer; }
.form-group-inline input[type="checkbox"] { width: auto; accent-color: #c0392b; }
.card-number-display {
  position: absolute;
  top: 15px;
  right: 20px;
  font-family: monospace;
  font-size: 1.3em;
  font-weight: 700;
  color: #c0392b;
  background: #f0e6d2;
  padding: 4px 12px;
  border-radius: 6px;
}
.form-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
.delete-input-wrap { text-align: center; margin: 20px 0; }
.delete-input-wrap input {
  width: 160px;
  padding: 10px;
  font-size: 1.2em;
  border: 3px solid #c0392b;
  border-radius: 8px;
  text-align: center;
  font-family: monospace;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  outline: none;
}
.delete-input-wrap input:focus { border-color: #e67e22; }
.card-preview {
  background: #fff;
  border: 2px solid #d5c4a1;
  border-radius: 10px;
  padding: 15px;
  margin: 15px 0;
}
.confirm-actions { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
.error-msg { color: #e74c3c; font-weight: 700; text-align: center; margin: 10px 0; }
.success-msg { color: #27ae60; font-weight: 700; text-align: center; margin: 10px 0; }
.footer-actions { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
@media (max-width: 600px) {
  h1 { font-size: 2em; letter-spacing: 3px; }
  .postal-section { font-size: 1em; flex-direction: column; }
  .modal-content { padding: 20px; }
  .type-select { flex-direction: column; align-items: center; }
}
</style>
</head>
<body>
<div id="app">
  <div id="mainPage">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <rect x="15" y="15" width="70" height="90" rx="6" fill="#d4a24e" stroke="#8b6914" stroke-width="2"/>
          <rect x="15" y="15" width="70" height="20" rx="6" fill="#c0392b"/>
          <rect x="15" y="31" width="70" height="2" fill="#8b6914"/>
          <rect x="15" y="15" width="70" height="20" rx="6" fill="none" stroke="#8b6914" stroke-width="2"/>
          <rect x="35" y="45" width="30" height="30" rx="4" fill="#fff" stroke="#8b6914" stroke-width="1.5"/>
          <text x="50" y="63" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b" font-family="Arial">$</text>
          <rect x="38" y="82" width="24" height="8" rx="2" fill="#c0392b"/>
          <ellipse cx="50" cy="15" rx="35" ry="6" fill="#e8c88a" stroke="#8b6914" stroke-width="2"/>
          <ellipse cx="50" cy="15" rx="18" ry="3" fill="#ccc" stroke="#999" stroke-width="1"/>
          <rect x="44" y="8" width="12" height="4" rx="2" fill="#999"/>
          <circle cx="50" cy="10" r="2" fill="#666"/>
        </svg>
      </div>
      <h1>DOLLAR CANS</h1>
    </div>
    <div class="postal-section">
      <label>POSTAL CODE:</label>
      <input type="text" id="postalInput" maxlength="3" placeholder="H4A" autocomplete="off">
    </div>
  </div>

  <div id="directoryPage">
    <div class="page-header">
      <button class="btn btn-secondary" id="backBtn">&larr; BACK</button>
      <h2 id="pageTitle"></h2>
      <span class="card-count" id="cardCount">0 cards</span>
    </div>
    <div class="cards-container" id="cardsContainer"></div>
    <div class="page-actions">
      <button class="btn btn-primary" id="newCardBtn">+ NEW CARD</button>
      <button class="btn btn-danger" id="deleteCardBtn">DELETE A CARD</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="postalPopup">
  <div class="modal-content">
    <div class="popup-msg" id="postalPopupMsg"></div>
    <div class="go-cards-wrap">
      <button class="btn btn-primary" id="goToCardsBtn">GO TO CARDS</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="newCardModal">
  <div class="modal-content" style="max-width:650px;">
    <span class="card-number-display" id="newCardNumber"></span>
    <h2>NEW CARD</h2>
    <div id="step1">
      <p style="text-align:center;font-weight:700;margin-bottom:10px;">Choose card type:</p>
      <div class="type-select">
        <label><input type="radio" name="cardType" value="CANS 4 CASH"> <span>CANS 4 CASH</span></label>
        <label><input type="radio" name="cardType" value="CASH 4 CANS"> <span>CASH 4 CANS</span></label>
      </div>
      <div class="next-wrap">
        <button class="btn btn-primary" id="nextBtn">NEXT</button>
      </div>
    </div>
    <div class="form-section" id="cans4cashForm">
      <div class="form-group">
        <label>Select Can Amount:</label>
        <div class="form-group-inline">
          <label><input type="checkbox" class="can-qty" value="25"> 25 cans</label>
          <label><input type="checkbox" class="can-qty" value="50"> 50 cans</label>
          <label><input type="checkbox" class="can-qty" value="100"> 100 cans</label>
        </div>
      </div>
      <div class="form-group">
        <label>Price Negotiation:</label>
        <div class="form-group-inline">
          <label><input type="checkbox" class="nego" value="nego"> Nego</label>
          <label><input type="checkbox" class="nego" value="non-nego"> Non-Nego</label>
        </div>
      </div>
      <div class="form-group"><label>Description</label><textarea id="cfcDesc" rows="2"></textarea></div>
      <div class="form-group"><label>My Price</label><input type="text" id="cfcPrice"></div>
      <div class="form-group"><label>Meet-up Info</label><input type="text" id="cfcMeetup"></div>
      <div class="form-group"><label>Phone</label><input type="text" id="cfcPhone"></div>
      <div class="form-group"><label>Email</label><input type="text" id="cfcEmail"></div>
    </div>
    <div class="form-section" id="cash4cansForm">
      <div class="form-group">
        <label>Cash Offer:</label>
        <div class="form-group-inline">
          <label><input type="checkbox" class="cash-offer" value="25"> $25</label>
          <label><input type="checkbox" class="cash-offer" value="50"> $50</label>
          <label><input type="checkbox" class="cash-offer" value="100"> $100</label>
        </div>
      </div>
      <div class="form-group">
        <label>Negotiation:</label>
        <div class="form-group-inline">
          <label><input type="checkbox" class="nego2" value="nego"> Nego</label>
          <label><input type="checkbox" class="nego2" value="non-nego"> Non-Nego</label>
        </div>
      </div>
      <div class="form-group"><label>Asking Number of Cans (must be equal or less than checked Cash Offer)</label><input type="number" id="c4cAsking" min="0"></div>
      <div class="form-group"><label>Cans that I Need</label><input type="text" id="c4cNeed"></div>
      <div class="form-group"><label>Meet-up Info</label><input type="text" id="c4cMeetup"></div>
      <div class="form-group"><label>Phone</label><input type="text" id="c4cPhone"></div>
      <div class="form-group"><label>Email</label><input type="text" id="c4cEmail"></div>
    </div>
    <div class="form-actions" id="formActions" style="display:none;">
      <button class="btn btn-success" id="saveCardBtn">SAVE CARD</button>
      <button class="btn btn-secondary" id="cancelNewCardBtn">CANCEL</button>
    </div>
    <div id="saveStatus"></div>
  </div>
</div>

<div class="modal-overlay" id="deleteCardModal">
  <div class="modal-content" style="max-width:500px;">
    <h2>DELETE A CARD</h2>
    <div id="deleteStep1">
      <p style="text-align:center;margin-bottom:10px;">ENTER CARD NUMBER</p>
      <div class="delete-input-wrap">
        <input type="text" id="deleteCardInput" maxlength="6" placeholder="A1B2C3" autocomplete="off">
      </div>
      <div style="text-align:center;">
        <button class="btn btn-primary" id="verifyDeleteBtn">VERIFY</button>
        <button class="btn btn-secondary" id="cancelDeleteBtn1">CANCEL</button>
      </div>
      <div id="deleteVerifyMsg"></div>
    </div>
    <div id="deleteStep2" style="display:none;">
      <div class="card-preview" id="deleteCardPreview"></div>
      <p style="text-align:center;font-weight:700;color:#e74c3c;margin:10px 0;">Are you sure you want to delete this card?</p>
      <div class="confirm-actions">
        <button class="btn btn-danger" id="confirmDeleteBtn">YES</button>
        <button class="btn btn-secondary" id="noDeleteBtn">NO</button>
      </div>
      <div id="deleteResult"></div>
    </div>
  </div>
</div>

<script>
(function() {
  var DB_KEY = 'dollarCansDB';
  var VALID_CODES = ['H4A','H4B','H3X','H4V','H4W','H4X','H3Y','H3Z'];
  var currentPostalCode = '';
  var currentPageId = '';
  var currentCardNumber = '';

  var DEFAULT_DATA = {
    postalCodes: [
      { code: 'H4A', area: 'NDG' },
      { code: 'H4B', area: 'NDG' },
      { code: 'H3X', area: 'NDG/Snowdon/Hampstead/Côte Saint-Luc' },
      { code: 'H4V', area: 'Côte Saint-Luc' },
      { code: 'H4W', area: 'Côte Saint-Luc' },
      { code: 'H4X', area: 'Hampstead/Westmount' },
      { code: 'H3Y', area: 'Westmount' },
      { code: 'H3Z', area: 'Westmount' }
    ],
    directoryPages: [
      { pageId: 'pg_H4A', postalCode: 'H4A', area: 'NDG' },
      { pageId: 'pg_H4B', postalCode: 'H4B', area: 'NDG' },
      { pageId: 'pg_H3X', postalCode: 'H3X', area: 'NDG/Snowdon/Hampstead/Côte Saint-Luc' },
      { pageId: 'pg_H4V', postalCode: 'H4V', area: 'Côte Saint-Luc' },
      { pageId: 'pg_H4W', postalCode: 'H4W', area: 'Côte Saint-Luc' },
      { pageId: 'pg_H4X', postalCode: 'H4X', area: 'Hampstead/Westmount' },
      { pageId: 'pg_H3Y', postalCode: 'H3Y', area: 'Westmount' },
      { pageId: 'pg_H3Z', postalCode: 'H3Z', area: 'Westmount' }
    ],
    cards: []
  };

  function loadDB() {
    var raw = localStorage.getItem(DB_KEY);
    if (raw) {
      try { return JSON.parse(raw); }
      catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
    }
    var data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    saveDB(data);
    return data;
  }

  function saveDB(data) {
    localStorage.setItem(DB_KEY, JSON.stringify(data, null, 2));
  }

  var db = loadDB();

  function getPostalCodeData(code) {
    for (var i = 0; i < db.postalCodes.length; i++) {
      if (db.postalCodes[i].code === code) return db.postalCodes[i];
    }
    return null;
  }

  function getDirectoryPage(code) {
    for (var i = 0; i < db.directoryPages.length; i++) {
      if (db.directoryPages[i].postalCode === code) return db.directoryPages[i];
    }
    return null;
  }

  function getCardsForPage(code) {
    var result = [];
    for (var i = 0; i < db.cards.length; i++) {
      if (db.cards[i].postalCode === code) result.push(db.cards[i]);
    }
    return result;
  }

  function generateCardNumber() {
    var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    var num;
    var exists;
    do {
      num = '';
      for (var i = 0; i < 6; i++) {
        num += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      exists = false;
      for (var i = 0; i < db.cards.length; i++) {
        if (db.cards[i].cardNumber === num) { exists = true; break; }
      }
    } while (exists);
    return num;
  }

  function getCardByNumber(num) {
    for (var i = 0; i < db.cards.length; i++) {
      if (db.cards[i].cardNumber === num) return db.cards[i];
    }
    return null;
  }

  function deleteCardByNumber(num) {
    var idx = -1;
    for (var i = 0; i < db.cards.length; i++) {
      if (db.cards[i].cardNumber === num) { idx = i; break; }
    }
    if (idx !== -1) {
      db.cards.splice(idx, 1);
      saveDB(db);
      return true;
    }
    return false;
  }

  function closeAllModals() {
    var modals = document.querySelectorAll('.modal-overlay');
    for (var i = 0; i < modals.length; i++) {
      modals[i].classList.remove('active');
    }
  }

  function openModal(id) {
    closeAllModals();
    document.getElementById(id).classList.add('active');
  }

  function renderCards(code) {
    var container = document.getElementById('cardsContainer');
    var cards = getCardsForPage(code);
    var countEl = document.getElementById('cardCount');
    countEl.textContent = cards.length + ' card' + (cards.length !== 1 ? 's' : '');
    if (cards.length === 0) {
      container.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">No cards yet. Click + NEW CARD to create one.</p>';
      return;
    }
    var html = '';
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      html += '<div class="card-item">';
      html += '<div class="card-item-header">';
      html += '<span class="card-item-type">' + c.type + '</span>';
      html += '<span class="card-item-number">#' + c.cardNumber + '</span>';
      html += '</div>';
      if (c.type === 'CANS 4 CASH') {
        html += '<div class="card-item-field"><strong>Cans:</strong> ' + c.canAmount + '</div>';
        html += '<div class="card-item-field"><strong>Price:</strong> ' + c.myPrice + '</div>';
        html += '<div class="card-item-field"><strong>Negotiation:</strong> ' + c.negotiation + '</div>';
        if (c.description) html += '<div class="card-item-field"><strong>Description:</strong> ' + c.description + '</div>';
      } else {
        html += '<div class="card-item-field"><strong>Cash Offer:</strong> $' + c.cashOffer + '</div>';
        html += '<div class="card-item-field"><strong>Asking Cans:</strong> ' + c.askingCans + '</div>';
        html += '<div class="card-item-field"><strong>Cans Needed:</strong> ' + c.cansNeeded + '</div>';
        html += '<div class="card-item-field"><strong>Negotiation:</strong> ' + c.negotiation + '</div>';
      }
      if (c.meetup) html += '<div class="card-item-field"><strong>Meet-up:</strong> ' + c.meetup + '</div>';
      if (c.phone) html += '<div class="card-item-field"><strong>Phone:</strong> ' + c.phone + '</div>';
      if (c.email) html += '<div class="card-item-field"><strong>Email:</strong> ' + c.email + '</div>';
      html += '</div>';
    }
    container.innerHTML = html;
  }

  // ---- POSTAL INPUT ----
  document.getElementById('postalInput').addEventListener('input', function() {
    var val = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '').substring(0, 3);
    this.value = val;
  });

  document.getElementById('postalInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var val = this.value.toUpperCase();
      var found = false;
      for (var i = 0; i < VALID_CODES.length; i++) {
        if (val === VALID_CODES[i]) { found = true; break; }
      }
      if (!found) {
        this.value = '';
        return;
      }
      var pcd = getPostalCodeData(val);
      if (pcd) {
        document.getElementById('postalPopupMsg').textContent = pcd.code + ' ' + pcd.area;
        openModal('postalPopup');
        document.getElementById('goToCardsBtn').onclick = function() {
          closeAllModals();
          showDirectoryPage(val);
        };
      }
    }
  });

  function showDirectoryPage(code) {
    currentPostalCode = code;
    var page = getDirectoryPage(code);
    var pcd = getPostalCodeData(code);
    if (page) currentPageId = page.pageId;
    document.getElementById('mainPage').style.display = 'none';
    document.getElementById('directoryPage').style.display = 'block';
    document.getElementById('pageTitle').textContent = 'POSTAL CODE: ' + code + ' - ' + (pcd ? pcd.area : '');
    renderCards(code);
  }

  document.getElementById('backBtn').addEventListener('click', function() {
    document.getElementById('directoryPage').style.display = 'none';
    document.getElementById('mainPage').style.display = 'block';
    document.getElementById('postalInput').value = '';
  });

  // ---- NEW CARD ----
  document.getElementById('newCardBtn').addEventListener('click', function() {
    resetNewCardForm();
    currentCardNumber = generateCardNumber();
    document.getElementById('newCardNumber').textContent = '#' + currentCardNumber;
    openModal('newCardModal');
  });

  function resetNewCardForm() {
    document.getElementById('step1').style.display = 'block';
    document.getElementById('cans4cashForm').classList.remove('active');
    document.getElementById('cash4cansForm').classList.remove('active');
    document.getElementById('formActions').style.display = 'none';
    document.getElementById('saveStatus').innerHTML = '';
    var radios = document.querySelectorAll('input[name="cardType"]');
    for (var i = 0; i < radios.length; i++) radios[i].checked = false;
    // Clear cans 4 cash fields
    var cfcQtys = document.querySelectorAll('.can-qty');
    for (var i = 0; i < cfcQtys.length; i++) cfcQtys[i].checked = false;
    var cfcNegos = document.querySelectorAll('.nego');
    for (var i = 0; i < cfcNegos.length; i++) cfcNegos[i].checked = false;
    document.getElementById('cfcDesc').value = '';
    document.getElementById('cfcPrice').value = '';
    document.getElementById('cfcMeetup').value = '';
    document.getElementById('cfcPhone').value = '';
    document.getElementById('cfcEmail').value = '';
    // Clear cash 4 cans fields
    var c4cOffers = document.querySelectorAll('.cash-offer');
    for (var i = 0; i < c4cOffers.length; i++) c4cOffers[i].checked = false;
    var c4cNegos = document.querySelectorAll('.nego2');
    for (var i = 0; i < c4cNegos.length; i++) c4cNegos[i].checked = false;
    document.getElementById('c4cAsking').value = '';
    document.getElementById('c4cNeed').value = '';
    document.getElementById('c4cMeetup').value = '';
    document.getElementById('c4cPhone').value = '';
    document.getElementById('c4cEmail').value = '';
  }

  document.getElementById('cancelNewCardBtn').addEventListener('click', function() {
    closeAllModals();
  });

  document.getElementById('nextBtn').addEventListener('click', function() {
    var selected = document.querySelector('input[name="cardType"]:checked');
    if (!selected) {
      document.getElementById('saveStatus').innerHTML = '<div class="error-msg">Please select a card type.</div>';
      return;
    }
    document.getElementById('saveStatus').innerHTML = '';
    document.getElementById('step1').style.display = 'none';
    document.getElementById('formActions').style.display = 'flex';
    if (selected.value === 'CANS 4 CASH') {
      document.getElementById('cans4cashForm').classList.add('active');
      document.getElementById('cash4cansForm').classList.remove('active');
    } else {
      document.getElementById('cash4cansForm').classList.add('active');
      document.getElementById('cans4cashForm').classList.remove('active');
    }
  });

  // Prevent multiple checkbox selection for can amounts
  var canQtys = document.querySelectorAll('.can-qty');
  for (var i = 0; i < canQtys.length; i++) {
    canQtys[i].addEventListener('change', function() {
      if (this.checked) {
        for (var j = 0; j < canQtys.length; j++) {
          if (canQtys[j] !== this) canQtys[j].checked = false;
        }
      }
    });
  }

  // Prevent multiple checkbox selection for nego
  var negos = document.querySelectorAll('.nego');
  for (var i = 0; i < negos.length; i++) {
    negos[i].addEventListener('change', function() {
      if (this.checked) {
        for (var j = 0; j < negos.length; j++) {
          if (negos[j] !== this) negos[j].checked = false;
        }
      }
    });
  }

  // Prevent multiple checkbox selection for cash offers
  var cashOffers = document.querySelectorAll('.cash-offer');
  for (var i = 0; i < cashOffers.length; i++) {
    cashOffers[i].addEventListener('change', function() {
      if (this.checked) {
        for (var j = 0; j < cashOffers.length; j++) {
          if (cashOffers[j] !== this) cashOffers[j].checked = false;
        }
      }
    });
  }

  // Prevent multiple checkbox selection for nego2
  var negos2 = document.querySelectorAll('.nego2');
  for (var i = 0; i < negos2.length; i++) {
    negos2[i].addEventListener('change', function() {
      if (this.checked) {
        for (var j = 0; j < negos2.length; j++) {
          if (negos2[j] !== this) negos2[j].checked = false;
        }
      }
    });
  }

  document.getElementById('saveCardBtn').addEventListener('click', function() {
    var selected = document.querySelector('input[name="cardType"]:checked');
    if (!selected) { closeAllModals(); return; }
    var type = selected.value;
    var statusEl = document.getElementById('saveStatus');
    statusEl.innerHTML = '';

    if (type === 'CANS 4 CASH') {
      var qtySelected = null;
      for (var i = 0; i < canQtys.length; i++) {
        if (canQtys[i].checked) { qtySelected = canQtys[i].value; break; }
      }
      if (!qtySelected) { statusEl.innerHTML = '<div class="error-msg">Please select a can amount.</div>'; return; }
      var negoVal = '';
      for (var i = 0; i < negos.length; i++) {
        if (negos[i].checked) { negoVal = negos[i].value; break; }
      }
      var card = {
        cardNumber: currentCardNumber,
        postalCode: currentPostalCode,
        type: type,
        canAmount: parseInt(qtySelected),
        negotiation: negoVal,
        description: document.getElementById('cfcDesc').value,
        myPrice: document.getElementById('cfcPrice').value,
        meetup: document.getElementById('cfcMeetup').value,
        phone: document.getElementById('cfcPhone').value,
        email: document.getElementById('cfcEmail').value
      };
      db.cards.push(card);
      saveDB(db);
      statusEl.innerHTML = '<div class="success-msg">Card saved successfully!</div>';
      setTimeout(function() { closeAllModals(); renderCards(currentPostalCode); }, 800);
    } else {
      var offerSelected = null;
      for (var i = 0; i < cashOffers.length; i++) {
        if (cashOffers[i].checked) { offerSelected = parseInt(cashOffers[i].value); break; }
      }
      if (!offerSelected) { statusEl.innerHTML = '<div class="error-msg">Please select a cash offer.</div>'; return; }
      var asking = parseInt(document.getElementById('c4cAsking').value);
      if (isNaN(asking) || asking < 0) { statusEl.innerHTML = '<div class="error-msg">Please enter a valid number of cans.</div>'; return; }
      if (asking > offerSelected) { statusEl.innerHTML = '<div class="error-msg">Asking number of cans must be equal or less than $' + offerSelected + '.</div>'; return; }
      var negoVal2 = '';
      for (var i = 0; i < negos2.length; i++) {
        if (negos2[i].checked) { negoVal2 = negos2[i].value; break; }
      }
      var card = {
        cardNumber: currentCardNumber,
        postalCode: currentPostalCode,
        type: type,
        cashOffer: offerSelected,
        negotiation: negoVal2,
        askingCans: asking,
        cansNeeded: document.getElementById('c4cNeed').value,
        meetup: document.getElementById('c4cMeetup').value,
        phone: document.getElementById('c4cPhone').value,
        email: document.getElementById('c4cEmail').value
      };
      db.cards.push(card);
      saveDB(db);
      statusEl.innerHTML = '<div class="success-msg">Card saved successfully!</div>';
      setTimeout(function() { closeAllModals(); renderCards(currentPostalCode); }, 800);
    }
  });

  // ---- DELETE CARD ----
  document.getElementById('deleteCardBtn').addEventListener('click', function() {
    document.getElementById('deleteStep1').style.display = 'block';
    document.getElementById('deleteStep2').style.display = 'none';
    document.getElementById('deleteCardInput').value = '';
    document.getElementById('deleteVerifyMsg').innerHTML = '';
    document.getElementById('deleteResult').innerHTML = '';
    openModal('deleteCardModal');
  });

  document.getElementById('cancelDeleteBtn1').addEventListener('click', function() {
    closeAllModals();
  });

  document.getElementById('noDeleteBtn').addEventListener('click', function() {
    closeAllModals();
  });

  document.getElementById('verifyDeleteBtn').addEventListener('click', function() {
    var input = document.getElementById('deleteCardInput');
    var val = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '').substring(0, 6);
    input.value = val;
    var msgEl = document.getElementById('deleteVerifyMsg');
    if (val.length !== 6) {
      msgEl.innerHTML = '<div class="error-msg">Please enter a 6-digit card number.</div>';
      return;
    }
    var card = getCardByNumber(val);
    if (!card) {
      msgEl.innerHTML = '<div class="error-msg">Card number not found in database.</div>';
      return;
    }
    msgEl.innerHTML = '';
    document.getElementById('deleteStep1').style.display = 'none';
    document.getElementById('deleteStep2').style.display = 'block';
    var preview = document.getElementById('deleteCardPreview');
    var html = '<div class="card-item-header"><span class="card-item-type">' + card.type + '</span><span class="card-item-number">#' + card.cardNumber + '</span></div>';
    if (card.type === 'CANS 4 CASH') {
      html += '<div class="card-item-field"><strong>Cans:</strong> ' + card.canAmount + '</div>';
      html += '<div class="card-item-field"><strong>Price:</strong> ' + (card.myPrice || '-') + '</div>';
      html += '<div class="card-item-field"><strong>Negotiation:</strong> ' + card.negotiation + '</div>';
      if (card.description) html += '<div class="card-item-field"><strong>Description:</strong> ' + card.description + '</div>';
    } else {
      html += '<div class="card-item-field"><strong>Cash Offer:</strong> $' + card.cashOffer + '</div>';
      html += '<div class="card-item-field"><strong>Asking:</strong> ' + card.askingCans + ' cans</div>';
      html += '<div class="card-item-field"><strong>Cans Needed:</strong> ' + (card.cansNeeded || '-') + '</div>';
      html += '<div class="card-item-field"><strong>Negotiation:</strong> ' + card.negotiation + '</div>';
    }
    if (card.meetup) html += '<div class="card-item-field"><strong>Meet-up:</strong> ' + card.meetup + '</div>';
    if (card.phone) html += '<div class="card-item-field"><strong>Phone:</strong> ' + card.phone + '</div>';
    if (card.email) html += '<div class="card-item-field"><strong>Email:</strong> ' + card.email + '</div>';
    preview.innerHTML = html;
    document.getElementById('confirmDeleteBtn').onclick = function() {
      var deleted = deleteCardByNumber(card.cardNumber);
      if (deleted) {
        document.getElementById('deleteResult').innerHTML = '<div class="success-msg">Card deleted successfully!</div>';
        setTimeout(function() { closeAllModals(); renderCards(currentPostalCode); }, 800);
      } else {
        document.getElementById('deleteResult').innerHTML = '<div class="error-msg">Error deleting card.</div>';
      }
    };
  });

  // Close modals on overlay click
  var overlays = document.querySelectorAll('.modal-overlay');
  for (var i = 0; i < overlays.length; i++) {
    overlays[i].addEventListener('click', function(e) {
      if (e.target === this) closeAllModals();
    });
  }
})();
</script>
</body>
</html>
